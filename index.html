<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Profissional - Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sala">
        <div class="parede"></div>
        <div class="chao"></div>
        <div class="luminaria"></div>
        <div class="luz-cone"></div>
        
        <div class="poltrona">
            <div class="encosto"></div>
            <div class="assento"></div>
            <div class="braco-esq"></div>
            <div class="braco-dir"></div>
        </div>
    </div>

    <div class="container">
        <form id="form-cadastro">
            <h2>Registro de Usuário</h2>
            <p>Por favor, preencha todos os campos cuidadosamente.</p>

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>
                <div class="input-group">
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" required>
                </div>
            </div>

            <div class="input-group">
                <label for="email">E-mail Profissional</label>
                <input type="email" id="email" required>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="genero">Identidade / Gênero</label>
                    <select id="genero" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="Trans">Transgênero</option>
                        <option value="Neutro">Gênero Neutro</option>
                        <option value="Homossexual">Homossexual</option>
                        <option value="Therian">Therian</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                </div>
            </div>

            <div class="input-group">
                <label for="endereco">Endereço Completo</label>
                <input type="text" id="endereco" placeholder="Rua, Número, Bairro...">
            </div>

            <button type="submit">Finalizar Registro</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
